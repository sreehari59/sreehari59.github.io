<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sreehari Pradeep Kumar — Enter</title>
    <meta
      name="description"
      content="Sreehari Pradeep Kumar — Full Stack AI Engineer. Choose your view: a technical build for developers, or a guided tour for everyone else."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root {
        --bg: #06080f;
        --fg: #e7edf7;
        --muted: #8a93a6;
        --card: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --emerald: #34d399;
        --cyan: #22d3ee;
        --violet: #a78bfa;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background:
          radial-gradient(1200px 600px at 20% -10%, rgba(34, 211, 238, 0.12), transparent 60%),
          radial-gradient(900px 500px at 90% 110%, rgba(167, 139, 250, 0.12), transparent 60%),
          var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, sans-serif;
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 2rem 1.25rem;
        -webkit-font-smoothing: antialiased;
      }
      .wrap { width: 100%; max-width: 60rem; text-align: center; }
      .badge {
        display: inline-flex; align-items: center; gap: 0.5rem;
        border: 1px solid rgba(52, 211, 153, 0.3);
        background: rgba(52, 211, 153, 0.06);
        color: #7ee7c0;
        font-size: 0.72rem; letter-spacing: 0.02em;
        padding: 0.35rem 0.75rem; border-radius: 999px;
        font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
      }
      .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--emerald); animation: pulse 1.8s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
      h1 { font-size: clamp(1.9rem, 5vw, 3.1rem); line-height: 1.05; margin: 1.25rem 0 0; font-weight: 650; letter-spacing: -0.02em; }
      .grad { background: linear-gradient(120deg, var(--emerald), var(--cyan) 45%, var(--violet)); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .sub { color: var(--muted); font-size: clamp(0.95rem, 2.2vw, 1.1rem); margin: 1rem auto 0; max-width: 34rem; line-height: 1.6; }
      .ask { margin-top: 2.5rem; font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-family: ui-monospace, monospace; }
      .cards { margin-top: 1.1rem; display: grid; grid-template-columns: 1fr; gap: 1rem; }
      @media (min-width: 640px) { .cards { grid-template-columns: 1fr 1fr; } }
      .card {
        appearance: none; cursor: pointer; text-align: left;
        background: var(--card); border: 1px solid var(--border); color: inherit;
        border-radius: 1rem; padding: 1.5rem 1.5rem 1.35rem;
        transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
        display: flex; flex-direction: column; gap: 0.5rem;
        font: inherit;
      }
      .card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.05); }
      .card.dev:hover { box-shadow: 0 20px 60px -25px rgba(34, 211, 238, 0.6); border-color: rgba(34, 211, 238, 0.4); }
      .card.general:hover { box-shadow: 0 20px 60px -25px rgba(167, 139, 250, 0.55); border-color: rgba(167, 139, 250, 0.4); }
      .card .k { font-family: ui-monospace, monospace; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
      .card .t { font-size: 1.25rem; font-weight: 600; }
      .card.dev .t { color: #7fe9f5; }
      .card.general .t { color: #c4b5fd; }
      .card .d { color: var(--muted); font-size: 0.92rem; line-height: 1.55; }
      .card .go { margin-top: 0.35rem; font-size: 0.82rem; color: var(--fg); opacity: 0.85; }
      .card .go::after { content: " →"; }
      .foot { margin-top: 2rem; font-size: 0.8rem; color: var(--muted); }
      .foot a { color: #9fb0c9; text-decoration: none; border-bottom: 1px solid transparent; }
      .foot a:hover { border-bottom-color: currentColor; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <span class="badge"><span class="dot"></span> Available for full-stack AI engineering</span>
      <h1>Sreehari <span class="grad">Pradeep Kumar</span></h1>
      <p class="sub">Full Stack AI Engineer — I design, ship and orchestrate multi-agent AI systems end-to-end.</p>

      <p class="ask">Before you go in — are you a developer?</p>
      <div class="cards">
        <button class="card dev" data-audience="dev" data-href="/dev/">
          <span class="k">for engineers</span>
          <span class="t">I'm a developer</span>
          <span class="d">A VS Code&ndash;style build &mdash; browse my work like an open project, file by file, with an AI assistant in the panel.</span>
          <span class="go">Enter the developer view</span>
        </button>
        <button class="card general" data-audience="general" data-href="/portfolio/">
          <span class="k">for everyone</span>
          <span class="t">Just browsing</span>
          <span class="d">A guided, visual tour of the work, projects and hackathon record — no jargon required.</span>
          <span class="go">Enter the portfolio</span>
        </button>
      </div>

      <p class="foot">You can switch anytime. Prefer to reach out? <a href="mailto:sreeharipradeepkumar1996@gmail.com">Email Sreehari</a>.</p>
    </main>

    <script>
      (function () {
        var KEY = "pv.audience";
        var dest = { dev: "/dev/", general: "/portfolio/" };
        var params = new URLSearchParams(location.search);
        var force = params.has("gate");

        // Returning visitor with a saved choice skips the gate (unless ?gate forces it).
        if (!force) {
          var saved = null;
          try { saved = localStorage.getItem(KEY); } catch (e) {}
          if (saved && dest[saved]) { location.replace(dest[saved]); return; }
        }

        document.querySelectorAll(".card").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var audience = btn.getAttribute("data-audience");
            try { localStorage.setItem(KEY, audience); } catch (e) {}
            location.href = btn.getAttribute("data-href");
          });
        });
      })();
    </script>
  </body>
</html>
